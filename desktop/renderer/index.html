<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self';" />
<title>Pegasus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0b0e14; --card: #141924; --line: #232b3a;
    --txt: #e7ecf5; --muted: #8792a6; --accent: #b892ff; --accent2: #7c5cff;
    --ok: #4ade80; --err: #ff6b7a;
  }
  html, body { height: 100%; }
  body {
    background: radial-gradient(120% 120% at 50% -10%, #161b2b 0%, var(--bg) 55%);
    color: var(--txt);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; user-select: none;
  }
  .card {
    width: 400px; padding: 40px 36px;
    text-align: center;
  }
  .logo {
    width: 56px; height: 56px; margin: 0 auto 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    filter: drop-shadow(0 4px 18px rgba(124,92,255,.5));
  }
  h1 { font-size: 22px; font-weight: 650; letter-spacing: -.02em; }
  .sub { color: var(--muted); font-size: 13.5px; margin-top: 8px; margin-bottom: 28px; }
  label { display: block; text-align: left; font-size: 12.5px; color: var(--muted); margin-bottom: 8px; }
  input {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    background: var(--card); border: 1px solid var(--line);
    color: var(--txt); font-size: 17px; letter-spacing: .12em;
    text-align: center; text-transform: uppercase; font-family: ui-monospace, monospace;
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(124,92,255,.18); }
  input::placeholder { color: #4a5468; letter-spacing: .12em; }
  button {
    width: 100%; margin-top: 16px; padding: 14px;
    border: 0; border-radius: 12px; cursor: pointer;
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff; font-size: 15px; font-weight: 600;
    transition: transform .1s, opacity .15s;
  }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: .55; cursor: default; transform: none; }
  .msg { margin-top: 16px; font-size: 13px; min-height: 18px; }
  .msg.err { color: var(--err); }
  .msg.ok { color: var(--ok); }
  .foot { margin-top: 26px; font-size: 11.5px; color: #5a6376; }
  .hidden { display: none; }
  .check { font-size: 46px; color: var(--ok); filter: drop-shadow(0 4px 16px rgba(74,222,128,.4)); margin-bottom: 8px; }
  .steps { text-align: left; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; margin-top: 20px; font-size: 13.5px; color: var(--muted); }
  .steps b { color: var(--txt); }
  kbd { background:#222a3a; border:1px solid #333d52; border-radius:6px; padding:1px 6px; font-family:ui-monospace,monospace; font-size:12px; color:var(--txt); }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes s { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <!-- ÉCRAN 1 : connexion -->
  <div class="card" id="loginCard">
    <div class="logo">🦄</div>
    <h1>Pegasus</h1>
    <div class="sub">Connecte Claude aux sites WordPress d'Orphic.</div>

    <label for="code">Ton code d'accès</label>
    <input id="code" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" autocomplete="off" spellcheck="false" />
    <button id="go">Connecter</button>
    <div class="msg" id="msg"></div>

    <div class="foot">Pas de code ? Demande-le à Sacha.</div>
  </div>

  <!-- ÉCRAN 2 : succès -->
  <div class="card hidden" id="doneCard">
    <div class="check">✓</div>
    <h1>C'est connecté&nbsp;!</h1>
    <div class="sub">Ta clé d'équipe est installée sur ce Mac.</div>
    <div class="steps">
      Dernière étape, dans <b>Claude Code</b>&nbsp;:
      <br>1. Ferme et rouvre Claude (<kbd>⌘</kbd>+<kbd>Q</kbd>)
      <br>2. Tape <kbd>/sites</kbd> pour voir tes sites 🎉
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
